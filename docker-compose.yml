services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8788:8788"
    environment:
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:?Set your OpenAI API key}
    volumes:
      - backend_data:/app/data

  lab:
    build:
      context: .
      dockerfile: Dockerfile.lab
    ports:
      - "3020:3020"
    depends_on:
      - backend

volumes:
  backend_data:
